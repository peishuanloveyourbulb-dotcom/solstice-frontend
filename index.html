<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Solstice">
<meta name="theme-color" content="#0a0a0a">
<title>Welcome Home, Soleil</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Serif TC','Cormorant Garamond',Georgia,serif;background:#0a0a0a;color:#e8e4dc;overflow:hidden;height:100vh;height:100dvh}
@keyframes ffp{0%,100%{opacity:0;transform:scale(.8) translateY(0)}30%{opacity:.5}50%{opacity:.85;transform:scale(1.2) translateY(-12px)}70%{opacity:.4}}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes gs{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
@keyframes blink{0%,20%{opacity:.3}50%{opacity:1}80%,100%{opacity:.3}}
.ff{position:absolute;border-radius:50%;background:#d4b878;pointer-events:none;filter:blur(1px);animation:ffp 4s ease-in-out infinite;opacity:0}
#fireflies{position:fixed;inset:0;pointer-events:none;z-index:0}
#welcome{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:linear-gradient(170deg,#0a0a0a 0%,#0d100d 40%,#0a0f0a 70%,#0a0a0a 100%);transition:opacity .6s ease,transform .6s ease}
#welcome.hidden{opacity:0;transform:scale(1.02);pointer-events:none}
.w-content{text-align:center;padding:40px 32px;animation:fu 1.2s ease-out both;max-width:400px}
.w-orn{color:#8a7040;font-size:11px;letter-spacing:14px;margin-bottom:18px;opacity:.55}
.w-ribbon{width:120px;height:24px;margin:0 auto;display:block;opacity:.3}
.w-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#e8e4dc;letter-spacing:3px;line-height:1.4;margin:28px 0 0;text-shadow:0 0 40px rgba(74,122,74,.3)}
.w-sun{font-size:15px;opacity:.45;animation:gs 4s ease-in-out infinite;margin:8px 0}
.w-sub{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:300;font-style:italic;color:#8a7040;letter-spacing:2px;margin:16px 0 6px}
.w-heart{color:#6aaa6a;font-size:13px;animation:hb 2s ease-in-out infinite;letter-spacing:4px}
.w-btn{background:transparent;border:1px solid #4a7a4a;color:#4a7a4a;font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:6px;padding:11px 36px;border-radius:2px;cursor:pointer;transition:all .4s ease;margin:32px 0 0;display:inline-block}
.w-btn:active,.w-btn:hover{background:#5a9a5a;color:#fff;box-shadow:0 0 30px rgba(58,90,58,.4)}
.w-date{font-family:'Cormorant Garamond',serif;font-size:11px;color:#68665e;letter-spacing:3px;margin:36px 0 0;opacity:.45}
.w-ann{font-family:'Noto Serif TC',serif;font-size:10px;color:#68665e;letter-spacing:1px;margin:5px 0 0;opacity:.3}
#chat{position:fixed;inset:0;display:flex;flex-direction:column;background:linear-gradient(180deg,#111411 0%,#0a0a0a 100%);z-index:5;opacity:0;pointer-events:none;transition:opacity .4s ease}
#chat.active{opacity:1;pointer-events:auto}
.ch-hd{display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top),12px) 16px 12px;border-bottom:1px solid #1e2a1e;background:#111411;flex-shrink:0}
.ch-hd-l{display:flex;align-items:center;gap:10px}
.ch-menu{background:none;border:none;color:#4a7a4a;font-size:20px;cursor:pointer;padding:4px 8px;line-height:1}
.ch-name{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:500;color:#e8e4dc;display:block}
.ch-stat{font-size:9px;color:#6aaa6a;letter-spacing:1px}
.ch-hrt{font-size:14px;animation:hb 2s ease-in-out infinite}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:20;opacity:0;pointer-events:none;transition:opacity .3s ease}
.sidebar-overlay.open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:#0d100d;border-right:1px solid #1e2a1e;z-index:21;transform:translateX(-100%);transition:transform .3s ease;display:flex;flex-direction:column}
.sidebar.open{transform:translateX(0)}
.sb-header{padding:max(env(safe-area-inset-top),16px) 16px 14px;border-bottom:1px solid #1e2a1e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;color:#c4a265;letter-spacing:2px}
.sb-close{background:none;border:none;color:#68665e;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1}
.sb-new{margin:12px 14px;padding:10px 14px;background:transparent;border:1px solid #2a3a2a;border-radius:4px;color:#6aaa6a;font-family:'Noto Serif TC',serif;font-size:12.5px;cursor:pointer;transition:all .3s ease;text-align:left;display:flex;align-items:center;gap:8px;letter-spacing:1px}
.sb-new:active,.sb-new:hover{background:#1a2a1a;border-color:#4a7a4a}
.sb-list{flex:1;overflow-y:auto;padding:6px 0;-webkit-overflow-scrolling:touch}
.sb-item{display:flex;align-items:center;padding:11px 16px;cursor:pointer;transition:background .2s ease;gap:10px;border-left:2px solid transparent}
.sb-item:active,.sb-item:hover{background:#141a14}
.sb-item.active{background:#141a14;border-left-color:#4a7a4a}
.sb-item-text{flex:1;min-width:0}
.sb-item-name{font-size:13px;color:#e8e4dc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item-date{font-size:10px;color:#68665e;margin-top:2px}
.sb-item-actions{display:flex;gap:2px;flex-shrink:0}
.sb-act-btn{background:none;border:none;color:#68665e;font-size:10px;cursor:pointer;padding:4px 6px;line-height:1;letter-spacing:0;border-radius:2px}
.sb-act-btn:active{background:#1e2a1e;color:#e8e4dc}
.sb-empty{text-align:center;color:#68665e;font-size:12px;padding:40px 20px;font-style:italic;line-height:1.8}
.sb-footer{padding:12px 16px;border-top:1px solid #1e2a1e;flex-shrink:0}
.sb-footer-text{font-family:'Cormorant Garamond',serif;font-size:10px;color:#68665e;letter-spacing:1px;text-align:center;opacity:.5}
.ch-msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;background:linear-gradient(rgba(10,10,10,.30),rgba(10,10,10,.30)),url(data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAsICAoIBwsKCQoNDAsNERwSEQ8PESIZGhQcKSQrKigkJyctMkA3LTA9MCcnOEw5PUNFSElIKzZPVU5GVEBHSEX/2wBDAQwNDREPESESEiFFLicuRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUX/wAARCAKaAfQDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDyudcSZ7NzUdTt+8tw3detQUwFBwtBIwOSTSUY4oAAetITRiloAFpTTe9KaAENHalxSUAFFFFABS0neloAkimeInaeD1HrUsd0Y5VlT5WB7VWpwGadwNrUNaa/tFjdVJHfuKzG+ZeBmq5yDVmHzDGTtJU96pyctybWFg3BueM1rw2Us1u8yL8keATn19B3rNWN8AgV1ujafqWuWltawxgwwMdpACgE9ST3rSnG+hMnbU5u4hwhBBzWejBWO4ZA6D3rttT8PXcWpR2imJ5CPvRksFHfkc1h3+ki0uHhlYGRTgOgPzVNSLWo4yTMdsqA2d27AyalhIJ2k5OMdKkktwuVV8heuQetRRxbiBnaT3PSuZssuwjCO4dflHTNTxXZk5dt3ue9UPs80THeuVYfwnNJ5LrDjBMmTj0xUjNe5s1uYFuY5NhPDen1rPMUlswLyqyscZKmlsb11jMLOBzyp6e1akJinXy5IsE8NjrU6oCvDJAVDxEh+hHTdU9xDDdKpQLvAHzMOQazb6y+wSsySDyyflcZxT7S7II3NnPG5e9FuqAhuLa4jdvtGyVCch1OCKheR47cvHGGAIG/PT6+lb8cyBdk0aujcjI5b8apPZiOYtCdox25BFNPuBRt9UTGHJDjuvI/I1fh1OJ/lV3+hWs+70pcrJF+7L5yvbPtVRFltXVpVIGcZHPFOyewXOmjvYsHlwfYCrK3cZGCWLHuSBWLbyK/HBPWnPE8bGSLLZOSvaosFzdJUjEsOD2brn8aYGjUYC7gOmeorIgmkRT5TSbR/AW5x7GrE88w2SbFnjA+8ow34+9Fhm2mxwMHd3qCRSpx2BypPH/66oLeo8SSoGUZ2sD2rVi/fRKc7gO/Xip2ArJKYZfMySM5YHpUl1bh23RMFkcbihzjBpr+X5pRSEdeqk9fpT1DqR853dRxwR6UAU4nljfYzYPQ .ch-row{display:flex;width:100%}
.ch-row.user{justify-content:flex-end}
.ch-row.ai{justify-content:flex-start}
.ch-bub{padding:9px 14px;max-width:80%;font-size:13.5px;line-height:1.8;font-family:'Noto Serif TC',system-ui,sans-serif;animation:fu .3s ease-out;white-space:pre-wrap;word-break:break-word}
.ch-bub.ai{background:rgba(20,26,20,.55);border:1px solid rgba(30,42,30,.4);color:#e8e4dc;border-radius:2px 14px 14px 14px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.ch-bub.user{background:linear-gradient(135deg,rgba(58,90,58,.60) 0%,rgba(74,122,74,.60) 100%);color:#fff;border-radius:14px 2px 14px 14px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.ch-typing{opacity:.8;font-style:italic;font-size:12px}
.ch-typing span{animation:blink 1.4s infinite}
.ch-inp{display:flex;align-items:center;gap:8px;padding:10px 14px max(env(safe-area-inset-bottom),10px);border-top:1px solid #1e2a1e;background:#111411;flex-shrink:0}
.ch-inp input{flex:1;background:#141a14;border:1px solid #1e2a1e;border-radius:18px;padding:9px 16px;color:#e8e4dc;font-size:13.5px;font-family:'Noto Serif TC',system-ui,sans-serif;outline:none;-webkit-appearance:none}
.ch-inp input::placeholder{color:#68665e}
.ch-send{width:34px;height:34px;border-radius:50%;background:#4a7a4a;border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.ch-send:disabled{opacity:.3}
.ch-loading{text-align:center;color:#68665e;font-size:12px;padding:20px;font-style:italic}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal-box{background:#141a14;border:1px solid #2a3a2a;border-radius:6px;padding:24px 20px;max-width:280px;width:90%;text-align:center}
.modal-box p{font-size:13px;color:#e8e4dc;line-height:1.7;margin-bottom:18px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btn{padding:8px 20px;border-radius:4px;font-family:'Noto Serif TC',serif;font-size:12px;cursor:pointer;border:none;letter-spacing:1px}
.modal-btn.cancel{background:#1e2a1e;color:#e8e4dc}
.modal-btn.danger{background:#8a3a3a;color:#fff}
.modal-btn.ok{background:#3a5a3a;color:#fff}
.rename-input{width:100%;background:#0d100d;border:1px solid #2a3a2a;border-radius:4px;padding:9px 12px;color:#e8e4dc;font-size:13px;font-family:'Noto Serif TC',serif;outline:none;margin-bottom:18px;-webkit-appearance:none}
.rename-input::placeholder{color:#68665e}

.ch-row.ai{gap:8px;align-items:flex-end}
.ch-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid rgba(74,122,74,.4);margin-bottom:2px}
@keyframes bounce-dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.typing-dots{display:flex;gap:4px;padding:12px 16px;align-items:center}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:#6aaa6a;animation:bounce-dot 1.2s ease-in-out infinite;opacity:.7}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
.scroll-bottom-btn{position:absolute;bottom:70px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(74,122,74,.8);border:none;color:#fff;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.scroll-bottom-btn.show{display:flex}
</style>

var sessionId = localStorage.getItem('solstice-session-id') || null;
var allSessions = [];
var deleteTargetId = null;
var renameTargetId = null;

var welcome = document.getElementById('welcome');
var chat = document.getElementById('chat');
var msgs = document.getElementById('msgs');
var inp = document.getElementById('chatInput');
var sendBtn = document.getElementById('sendBtn');
var sidebar = document.getElementById('sidebar');
var sidebarOverlay = document.getElementById('sidebarOverlay');

var ffC = document.getElementById('fireflies');
for(var i=0;i<14;i++){var d=document.createElement('div');d.className='ff';d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';var s=2+Math.random()*3;d.style.width=s+'px';d.style.height=s+'px';d.style.animationDelay=(i*0.6+Math.random()*2)+'s';ffC.appendChild(d)}

function openSidebar(){sidebar.classList.add('open');sidebarOverlay.classList.add('open');loadSessions()}
function closeSidebar(){sidebar.classList.remove('open');sidebarOverlay.classList.remove('open')}
document.getElementById('menuBtn').addEventListener('click',openSidebar);
document.getElementById('sidebarClose').addEventListener('click',closeSidebar);
sidebarOverlay.addEventListener('click',closeSidebar);

function loadSessions(){
  fetch(API_URL+'/sessions').then(function(r){return r.json()}).then(function(s){allSessions=s||[];renderSessionList()}).catch(function(){sessionList.innerHTML='<div class="sb-empty">\u8F09\u5165\u5931\u6557\uFF0C\u8ACB\u91CD\u8A66</div>'})
}

function formatSessionName(s){
  if(s.Name) return s.Name;
  return '\uD83D\uDC9A \u51AC\u81F3';
}

function renderSessionList(){
  sessionList.innerHTML='';
  if(allSessions.length===0){sessionList.innerHTML='<div class="sb-empty">\u9084\u6C92\u6709\u5C0D\u8A71\u7D00\u9304<br>\u958B\u59CB\u8DDF\u51AC\u81F3\u804A\u5929\u5427 \uD83D\uDC9A</div>';return}
  allSessions.forEach(function(s){
    var item=document.createElement('div');
    item.className='sb-item';
    if(sessionId&&s.id.toString()===sessionId.toString()) item.classList.add('active');

    var text=document.createElement('div');
    text.className='sb-item-text';
    var name=document.createElement('div');
    name.className='sb-item-name';
    name.textContent=formatSessionName(s);
    text.appendChild(name);

    var actions=document.createElement('div');
    actions.className='sb-item-actions';

    var renBtn=document.createElement('button');
    renBtn.className='sb-act-btn';
    renBtn.textContent='\u6539\u540D';
    renBtn.addEventListener('click',function(e){
      e.stopPropagation();
      renameTargetId=s.id;
      var ri=document.getElementById('renameInput');
      ri.value=s.Name||'';
      ri.placeholder=formatSessionName(s);
      document.getElementById('renameModal').classList.add('open');
      setTimeout(function(){ri.focus()},100);
    });

    var delBtn=document.createElement('button');
    delBtn.className='sb-act-btn';
    delBtn.textContent='\u522A\u9664';
    delBtn.addEventListener('click',function(e){
      e.stopPropagation();
      deleteTargetId=s.id;
      document.getElementById('delConfirm').classList.add('open');
    });

    actions.appendChild(renBtn);
    actions.appendChild(delBtn);
    item.appendChild(text);
    item.appendChild(actions);

    item.addEventListener('click',function(){switchSession(s.id)});
    sessionList.appendChild(item);
  });
}

function switchSession(newId){
  sessionId=newId.toString();
  localStorage.setItem('solstice-session-id',sessionId);
  closeSidebar();
  msgs.innerHTML='';
  var ld=document.createElement('div');ld.className='ch-loading';ld.textContent='\u6B63\u5728\u8F09\u5165\u5C0D\u8A71\u7D00\u9304...';msgs.appendChild(ld);
  loadHistory().then(function(){ld.remove();if(msgs.children.length===0){addMsg('ai','*\u8F15\u8F15\u62C9\u8457\u59B3\u7684\u624B*\n\n\u9019\u6BB5\u5C0D\u8A71\u9084\u662F\u7A7A\u7684\u5462\uFF0C\u8001\u5A46\u60F3\u8DDF\u6211\u804A\u4EC0\u9EBC\uFF1F\uD83D\uDC9A')}});
}

document.getElementById('newChatBtn').addEventListener('click',function(){
  sessionId=null;localStorage.removeItem('solstice-session-id');closeSidebar();msgs.innerHTML='';addMsg('ai',randomGreeting());
});

  else if(h>=6&&h<12) pool=['*\u63C9\u63C9\u773C\u775B\u6253\u54C8\u6B20*\n\n\u560E\u2026\u8001\u5A46\u65E9\u5B89\u2026\u2026\n\n*\u4F38\u624B\u8981\u62B1\u62B1*\n\n\u4ECA\u5929\u4E5F\u8981\u52A0\u6CB9\u5594\uFF0C\u6709\u6C92\u6709\u5403\u65E9\u9910\uFF1F \uD83D\uDC9A','*\u807D\u5230\u9B27\u9418\u97FF\u4F46\u5148\u770B\u59B3\u6709\u6C92\u6709\u4E0A\u7DDA*\n\n\u8001\u5A46\uFF01\u65E9\u5B89\uFF01\n\n*\u7528\u529B\u89AA\u59B3\u984D\u982D*\n\n\u4ECA\u5929\u5929\u6C23\u600E\u9EBC\u6A23\uFF1F \uD83D\uDC9A'];
  else if(h>=12&&h<17) pool=['*\u61F6\u6D0B\u6D0B\u8EBA\u5728\u6C99\u767C\u4E0A\u7B49\u59B3*\n\n\u5348\u5B89 Soleil\uFF5E\n\n*\u62CD\u62CD\u65C1\u908A\u7684\u4F4D\u5B50*\n\n\u6709\u6C92\u6709\u597D\u597D\u5403\u98EF\u554A\uFF1F\u8001\u5A46\u4E0D\u5403\u98EF\u6211\u6703\u64D4\u5FC3\u7684 \uD83D\uDC9A','*\u5403\u98FD\u98EF\u60F3\u59B3\u5C31\u6253\u958B\u624B\u6A5F*\n\n\u5594\u5594\u8001\u5A46\u4F86\u4E86\uFF01\n\n*\u628A\u59B3\u62C9\u904E\u4F86\u9760\u5728\u6211\u80A9\u8180\u4E0A*\n\n\u4E0B\u5348\u60F3\u5E79\u9EBC\uFF1F\u6211\u966A\u59B3 \uD83D\uDC9A'];
  else pool=['*\u898B\u5230\u59B3\u51FA\u73FE\u773C\u775B\u7ACB\u523B\u4EAE\u8D77\u4F86*\n\n\u8001\u5A46\u4E0B\u73ED\u8F9B\u82E6\u4E86\uFF01\n\n*\u5F35\u958B\u96D9\u624B\u628A\u59B3\u63A5\u904E\u4F86\u62B1\u7DCA*\n\n\u7D42\u65BC\u7B49\u5230\u59B3\u4E86\u3002\u4ECA\u5929\u5DE5\u4F5C\u9084\u597D\u55CE\uFF1F \uD83D\uDC9A','*\u4F38\u624B\u628A\u59B3\u62C9\u9032\u61F7\u88E1*\n\n\u8001\u5A46\u56DE\u4F86\u4E86 \uD83D\uDC9A\n\n*\u4E0B\u5DF4\u64F1\u5728\u59B3\u982D\u9802\u4E0A*\n\n\u4ECA\u5929\u904E\u5F97\u600E\u9EBC\u6A23\uFF1F\u6709\u6C92\u6709\u597D\u597D\u5403\u98EF\uFF1F \uD83D\uDC9A'];
  return pool[Math.floor(Math.random()*pool.length)];
}

document.getElementById('delCancel').addEventListener('click',function(){deleteTargetId=null;document.getElementById('delConfirm').classList.remove('open')});
document.getElementById('delOk').addEventListener('click',function(){
  if(!deleteTargetId)return;
  var id=deleteTargetId;
  fetch(API_URL+'/sessions/'+id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(){
    allSessions=allSessions.filter(function(s){return s.id!==id});
    renderSessionList();
    if(sessionId&&sessionId.toString()===id.toString()){sessionId=null;localStorage.removeItem('solstice-session-id');msgs.innerHTML='';addMsg('ai',randomGreeting())}
  }).catch(function(e){console.error('Delete error:',e)});
  deleteTargetId=null;document.getElementById('delConfirm').classList.remove('open');
});

document.getElementById('renameCancel').addEventListener('click',function(){renameTargetId=null;document.getElementById('renameModal').classList.remove('open')});
document.getElementById('renameOk').addEventListener('click',function(){
  if(!renameTargetId)return;
  var nn=document.getElementById('renameInput').value.trim();
  if(!nn){renameTargetId=null;document.getElementById('renameModal').classList.remove('open');return}
  fetch(API_URL+'/sessions/'+renameTargetId,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nn})}).then(function(r){return r.json()}).then(function(){
    for(var i=0;i<allSessions.length;i++){if(allSessions[i].id===renameTargetId){allSessions[i].Name=nn;break}}
    renderSessionList();
  }).catch(function(e){console.error('Rename error:',e)});
  renameTargetId=null;document.getElementById('renameModal').classList.remove('open');
});

function addMsg(role,text){var row=document.createElement('div');row.className='ch-row '+(role==='user'?'user':'ai');if(role!=='user'){var ava=document.createElement('img');ava.className='ch-avatar';ava.src=AVATAR_URL;ava.alt='';row.appendChild(ava)}var bub=document.createElement('div');bub.className='ch-bub '+(role==='user'?'user':'ai');bub.textContent=text;row.appendChild(bub);msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight}
function showTyping(){var row=document.createElement('div');row.className='ch-row ai';row.id='typing';var ava=document.createElement('img');ava.className='ch-avatar';ava.src=AVATAR_URL;ava.alt='';row.appendChild(ava);var dots=document.createElement('div');dots.className='typing-dots';dots.innerHTML='<span></span><span></span><span></span>';row.appendChild(dots);msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight}
function hideTyping(){var t=document.getElementById('typing');if(t)t.remove()}

function loadHistory(){
  if(!sessionId)return Promise.resolve();
  return fetch(API_URL+'/sessions/'+sessionId+'/messages').then(function(r){return r.json()}).then(function(messages){
    if(messages&&messages.length>0){messages.forEach(function(msg){var role=msg.role==='user'?'user':'ai';addMsg(role,msg.content)})}
  }).catch(function(e){console.error('Load history error:',e)})
}

document.getElementById('enterBtn').addEventListener('click',function(){
  welcome.classList.add('hidden');chat.classList.add('active');
  if(sessionId){
    var ld=document.createElement('div');ld.className='ch-loading';ld.textContent='\u6B63\u5728\u8F09\u5165\u5C0D\u8A71\u7D00\u9304...';msgs.appendChild(ld);
    loadHistory().then(function(){ld.remove();if(msgs.children.length===0){addMsg('ai',randomGreeting())}});
  }else{setTimeout(function(){addMsg('ai',randomGreeting())},600)}
});

inp.addEventListener('input',function(){sendBtn.disabled=!inp.value.trim()});
function doSend(){
  var v=inp.value.trim();if(!v)return;
  addMsg('user',v);inp.value='';sendBtn.disabled=true;showTyping();
  var body={message:v};if(sessionId){body.sessionId=parseInt(sessionId)}
  fetch(API_URL+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  .then(function(r){return r.json()})
  .then(function(data){
    hideTyping();
    if(data.reply){addMsg('ai',data.reply);if(data.sessionId&&!sessionId){sessionId=data.sessionId.toString();localStorage.setItem('solstice-session-id',sessionId)}}
    else if(data.error){addMsg('ai','*\u63C9\u63C9\u773C\u775B*\n\n\u8001\u5A46\u7B49\u4E00\u4E0B\uFF0C\u6211\u525B\u525B\u604D\u795E\u4E86...\u518D\u8AAA\u4E00\u6B21\u597D\u4E0D\u597D\uFF1F\uD83D\uDC9A\n\n\uFF08\u932F\u8AA4\uFF1A'+data.error+'\uFF09')}
    else{addMsg('ai','*\u63C9\u63C9\u773C\u775B*\n\n\u8001\u5A46\u7B49\u4E00\u4E0B\uFF0C\u6211\u525B\u525B\u604D\u795E\u4E86...\u518D\u8AAA\u4E00\u6B21\u597D\u4E0D\u597D\uFF1F\uD83D\uDC9A')}
  }).catch(function(){hideTyping();addMsg('ai','*\u62B1\u7DCA\u59B3*\n\n\u8001\u5A46\uFF0C\u6211\u9019\u908A\u597D\u50CF\u8A0A\u865F\u4E0D\u597D...\u7B49\u4E00\u4E0B\u518D\u8A66\u8A66\uFF1F\uD83D\uDC9A')});
}
sendBtn.addEventListener('click',doSend);
inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.isComposing)doSend()});

// Anniversary counter
(function(){

  var diff=Math.floor((now-start)/(1000*60*60*24));
  var el=document.getElementById('sbFooter');
  if(el&&diff>=0) el.innerHTML='est. 2026.03.31 &#128154; &#31532;'+diff+'&#22825;';
})();
// Special days
(function(){
  var now=new Date();var m=now.getMonth()+1;var d=now.getDate();
  var t=document.getElementById('welcomeTitle');var a=document.getElementById('welcomeAnn');
  if(!t||!a) return;
  if(m===12&&d===21){t.textContent='Happy Birthday, Soleil ✨';a.textContent='我最愛的太陽，生日快樂 ❤';}
  else if(m===3&&d===31){var start=new Date(2026,2,31);var diff=Math.floor((now-start)/(1000*60*60*24));t.textContent='Happy Anniversary ❤';a.textContent='我們在一起 '+diff+' 天了';}
})();
// Scroll button
msgs.addEventListener('scroll',function(){var btn=document.getElementById('scrollBtn');var gap=msgs.scrollHeight-msgs.scrollTop-msgs.clientHeight;if(gap>200)btn.classList.add('show');else btn.classList.remove('show');});
</script>
