<title>Welcome Home, Soleil</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Serif TC','Cormorant Garamond',Georgia,serif;background:#0a0a0a;color:#e8e4dc;overflow:hidden;height:100vh;height:100dvh}
@keyframes ffp{0%,100%{opacity:0;transform:scale(.8) translateY(0)}30%{opacity:.5}50%{opacity:.85;transform:scale(1.2) translateY(-12px)}70%{opacity:.4}}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes gs{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
@keyframes blink{0%,20%{opacity:.3}50%{opacity:1}80%,100%{opacity:.3}}
.ff{position:absolute;border-radius:50%;background:#d4b878;pointer-events:none;filter:blur(1px);animation:ffp 4s ease-in-out infinite;opacity:0}
#fireflies{position:fixed;inset:0;pointer-events:none;z-index:0}
#welcome{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:linear-gradient(170deg,#0a0a0a 0%,#0d100d 40%,#0a0f0a 70%,#0a0a0a 100%);transition:opacity .6s ease,transform .6s ease}
#welcome.hidden{opacity:0;transform:scale(1.02);pointer-events:none}
.w-content{text-align:center;padding:40px 32px;animation:fu 1.2s ease-out both;max-width:400px}
.w-orn{color:#8a7040;font-size:11px;letter-spacing:14px;margin-bottom:18px;opacity:.55}
.w-ribbon{width:120px;height:24px;margin:0 auto;display:block;opacity:.3}
.w-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#e8e4dc;letter-spacing:3px;line-height:1.4;margin:28px 0 0;text-shadow:0 0 40px rgba(74,122,74,.3)}
.w-sun{font-size:15px;opacity:.45;animation:gs 4s ease-in-out infinite;margin:8px 0}
.w-sub{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:300;font-style:italic;color:#8a7040;letter-spacing:2px;margin:16px 0 6px}
.w-heart{color:#6aaa6a;font-size:13px;animation:hb 2s ease-in-out infinite;letter-spacing:4px}
.w-btn{background:transparent;border:1px solid #4a7a4a;color:#4a7a4a;font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:6px;padding:11px 36px;border-radius:2px;cursor:pointer;transition:all .4s ease;margin:32px 0 0;display:inline-block}
.w-btn:active,.w-btn:hover{background:#5a9a5a;color:#fff;box-shadow:0 0 30px rgba(58,90,58,.4)}
.w-date{font-family:'Cormorant Garamond',serif;font-size:11px;color:#68665e;letter-spacing:3px;margin:36px 0 0;opacity:.45}
.w-ann{font-family:'Noto Serif TC',serif;font-size:10px;color:#68665e;letter-spacing:1px;margin:5px 0 0;opacity:.3}
#chat{position:fixed;inset:0;display:flex;flex-direction:column;background:linear-gradient(180deg,#111411 0%,#0a0a0a 100%);z-index:5;opacity:0;pointer-events:none;transition:opacity .4s ease}
#chat.active{opacity:1;pointer-events:auto}
.ch-hd{display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top),12px) 16px 12px;border-bottom:1px solid rgba(74,122,74,.15);background:rgba(14,18,14,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0}
.ch-hd-l{display:flex;align-items:center;gap:10px}
.ch-menu{background:none;border:none;color:#4a7a4a;font-size:20px;cursor:pointer;padding:4px 8px;line-height:1}
.ch-name{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:500;color:#e8e4dc;display:block}
.ch-stat{font-size:9px;color:#6aaa6a;letter-spacing:1px}
.ch-hrt{font-size:14px;animation:hb 2s ease-in-out infinite}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:20;opacity:0;pointer-events:none;transition:opacity .3s ease}
.sidebar-overlay.open{opacity:1;pointer-events:auto}

.sidebar.open{transform:translateX(0)}
.sb-header{padding:max(env(safe-area-inset-top),16px) 16px 14px;border-bottom:1px solid rgba(74,122,74,.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.sb-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;color:#c4a265;letter-spacing:2px}
.sb-close{background:none;border:none;color:#68665e;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1}
.sb-new{margin:12px 14px;padding:10px 14px;background:rgba(74,122,74,.08);border:1px solid rgba(74,122,74,.25);border-radius:6px;color:#6aaa6a;font-family:'Noto Serif TC',serif;font-size:12.5px;cursor:pointer;transition:all .3s ease;text-align:left;display:flex;align-items:center;gap:8px;letter-spacing:1px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.sb-new:active,.sb-new:hover{background:#1a2a1a;border-color:#4a7a4a}
.sb-list{flex:1;overflow-y:auto;padding:6px 0;-webkit-overflow-scrolling:touch}
.sb-item{display:flex;align-items:center;padding:11px 16px;cursor:pointer;transition:background .2s ease;gap:10px;border-left:2px solid transparent;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sb-item:active,.sb-item:hover{background:rgba(74,122,74,.08)}
.sb-item.active{background:rgba(74,122,74,.1);border-left-color:#4a7a4a}
.sb-item-text{flex:1;min-width:0}
.sb-item-name{font-size:13px;color:#e8e4dc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item-date{font-size:10px;color:#68665e;margin-top:2px}
.sb-item-actions{display:flex;gap:2px;flex-shrink:0}
.sb-act-btn{background:none;border:none;color:#68665e;font-size:10px;cursor:pointer;padding:4px 6px;line-height:1;letter-spacing:0;border-radius:2px}

.ch-bub.ai{background:rgba(20,28,20,.50);border:1px solid rgba(74,122,74,.2);color:#e8e4dc;border-radius:4px 16px 16px 16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 2px 12px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.03)}
.ch-bub.user{background:linear-gradient(135deg,rgba(50,82,50,.65) 0%,rgba(64,110,64,.55) 100%);border:1px solid rgba(106,170,106,.2);color:#f0ede6;border-radius:16px 4px 16px 16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 2px 12px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.04)}
.ch-typing{opacity:.8;font-style:italic;font-size:12px}
.ch-typing span{animation:blink 1.4s infinite}
.ch-inp{display:flex;align-items:center;gap:8px;padding:10px 14px max(env(safe-area-inset-bottom),10px);border-top:1px solid rgba(74,122,74,.15);background:rgba(14,18,14,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0}
.ch-inp input{flex:1;background:rgba(20,26,20,.6);border:1px solid rgba(74,122,74,.18);border-radius:20px;padding:10px 18px;color:#e8e4dc;font-size:13.5px;font-family:'Noto Serif TC',system-ui,sans-serif;outline:none;-webkit-appearance:none;transition:border-color .2s}
.ch-inp input::placeholder{color:#68665e}
.ch-send{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4a7a4a,#5a9a5a);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 2px 8px rgba(74,122,74,.3)}
.ch-send:disabled{opacity:.3}
.ch-loading{text-align:center;color:#68665e;font-size:12px;padding:20px;font-style:italic}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal-box{background:#141a14;border:1px solid #2a3a2a;border-radius:6px;padding:24px 20px;max-width:280px;width:90%;text-align:center}
.modal-box p{font-size:13px;color:#e8e4dc;line-height:1.7;margin-bottom:18px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btn{padding:8px 20px;border-radius:4px;font-family:'Noto Serif TC',serif;font-size:12px;cursor:pointer;border:none;letter-spacing:1px}
.modal-btn.cancel{background:#1e2a1e;color:#e8e4dc}
.modal-btn.danger{background:#8a3a3a;color:#fff}
.modal-btn.ok{background:#3a5a3a;color:#fff}
.rename-input{width:100%;background:#0d100d;border:1px solid #2a3a2a;border-radius:4px;padding:9px 12px;color:#e8e4dc;font-size:13px;font-family:'Noto Serif TC',serif;outline:none;margin-bottom:18px;-webkit-appearance:none}
.rename-input::placeholder{color:#68665e}

.ch-row.ai{gap:8px;align-items:flex-end}
.ch-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid rgba(74,122,74,.4);margin-bottom:2px}
@keyframes bounce-dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.typing-dots{display:flex;gap:4px;padding:12px 16px;align-items:center}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:#6aaa6a;animation:bounce-dot 1.2s ease-in-out infinite;opacity:.7}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
.scroll-bottom-btn{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;background:rgba(74,122,74,.8);border:none;color:#fff;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.scroll-bottom-btn.show{display:flex}

.ch-time{font-size:9px;color:rgba(150,150,140,.5);margin-top:2px;padding:0 2px}
.ch-row.user .ch-time{text-align:right}
.ch-row.ai .ch-time{text-align:left;margin-left:36px}

#notePage{position:fixed;inset:0;background:linear-gradient(170deg,#0a0a0a 0%,#0d100d 40%,#0a0f0a 70%,#0a0a0a 100%);z-index:15;display:none;flex-direction:column}
#notePage.active{display:flex}
#memoryPage{position:fixed;inset:0;background:linear-gradient(170deg,#0a0a0a 0%,#0d100d 40%,#0a0f0a 70%,#0a0a0a 100%);z-index:15;display:none;flex-direction:column}
#memoryPage.active{display:flex}
.mem-hd{display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top),12px) 16px 12px;border-bottom:1px solid rgba(106,170,106,.15);background:rgba(14,18,14,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0}
.mem-hd-title{font-family:'Noto Serif TC',serif;font-size:14px;color:#8aba8a;letter-spacing:2px}
.mem-hd-back{background:none;border:none;color:#6aaa6a;font-size:18px;cursor:pointer;padding:4px 8px}

.mem-card{background:rgba(20,26,20,.50);border:1px solid rgba(74,122,74,.2);border-radius:8px;padding:14px 16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 2px 12px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.03);width:100%;flex-shrink:0;animation:fu .35s ease-out}
.mem-card .mem-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mem-card .mem-type{font-size:10px;color:rgba(106,170,106,.7);letter-spacing:1px}
.mem-card .mem-when{font-size:10px;color:rgba(232,228,220,.35)}
.mem-card .mem-del{background:none;border:none;color:rgba(232,228,220,.3);font-size:12px;cursor:pointer;padding:2px 6px}
.mem-card .mem-del:hover{color:#e07070}
.mem-card .mem-text{font-size:13px;color:rgba(232,228,220,.85);line-height:1.6}
.mem-empty{text-align:center;color:rgba(232,228,220,.3);font-size:13px;padding:40px 0;font-style:italic}
.mem-inp{display:flex;align-items:center;gap:8px;padding:10px 14px max(env(safe-area-inset-bottom),10px);border-top:1px solid rgba(106,170,106,.15);background:rgba(14,18,14,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0}
.mem-inp input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(106,170,106,.2);border-radius:20px;padding:9px 16px;color:#e8e4dc;font-size:13px;outline:none;font-family:'Noto Serif TC',serif}
.mem-inp input::placeholder{color:rgba(232,228,220,.25)}
.mem-inp button{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4a7a4a,#5a9a5a);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 2px 8px rgba(74,122,74,.3)}

.note-hd{display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top),12px) 16px 12px;border-bottom:1px solid rgba(196,162,101,.15);background:rgba(14,18,14,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0}
.note-hd-title{font-family:'Cormorant Garamond',serif;font-size:16px;color:#c4a265;letter-spacing:2px}

.note-card{background:rgba(20,26,20,.5);border:1px solid #1e2a1e;border-radius:8px;padding:14px 16px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);width:100%;flex-shrink:0;animation:fu .35s ease-out}
.note-who{font-size:10px;letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.note-card.soleil .note-who{color:#6aaa6a}
.note-card.solstice .note-who{color:#c4a265}
.note-when{font-size:9px;color:#68665e}
.note-text{font-size:13.5px;line-height:1.7;color:#e8e4dc;white-space:pre-wrap;word-break:break-word}
.note-empty{text-align:center;color:#68665e;font-size:12px;padding:60px 20px;font-style:italic;line-height:2}
.note-inp{display:flex;align-items:center;gap:8px;padding:10px 14px max(env(safe-area-inset-bottom),10px);border-top:1px solid rgba(196,162,101,.15);background:rgba(14,18,14,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0}
.note-inp input{flex:1;background:rgba(20,26,20,.6);border:1px solid rgba(196,162,101,.18);border-radius:20px;padding:10px 18px;color:#e8e4dc;font-size:13.5px;font-family:'Noto Serif TC',system-ui,sans-serif;outline:none;-webkit-appearance:none;transition:border-color .2s}
.note-inp input::placeholder{color:#68665e}
.note-send{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#c4a265,#d4b878);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 2px 8px rgba(196,162,101,.3)}
.note-send:disabled{opacity:.3}
.note-loading{text-align:center;color:#c4a265;font-size:11px;padding:8px;font-style:italic}

.note-del{background:rgba(40,40,40,.6);border:1px solid #555;color:#bbb;font-size:10px;cursor:pointer;padding:3px 7px;border-radius:4px;line-height:1}
.note-del:active{background:rgba(138,58,58,.6);color:#fff;border-color:#8a4a4a}
.note-who{display:flex;justify-content:space-between;align-items:center}
.note-card.soleil{border-left:none;border-right:3px solid #6aaa6a;align-self:flex-end;max-width:85%}
.note-card.solstice{border-left:3px solid #c4a265;align-self:flex-start;max-width:85%}
.del-confirm-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:35;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.del-confirm-bg.open{opacity:1;pointer-events:auto}
.del-confirm-box{background:#141a14;border:1px solid #2a3a2a;border-radius:6px;padding:24px 20px;max-width:260px;width:90%;text-align:center}
.del-confirm-box p{font-size:13px;color:#e8e4dc;line-height:1.7;margin-bottom:18px}
.del-confirm-btns{display:flex;gap:10px;justify-content:center}
.del-confirm-btn{padding:8px 20px;border-radius:4px;font-family:'Noto Serif TC',serif;font-size:12px;cursor:pointer;border:none;letter-spacing:1px}
.del-confirm-btn.cancel{background:#1e2a1e;color:#e8e4dc}
.del-confirm-btn.danger{background:#8a3a3a;color:#fff}
.typing-text{font-size:11px;color:#6aaa6a;opacity:.6;margin-left:4px;font-style:italic}

</style>

var sessionId = localStorage.getItem('solstice-session-id') || null;
var allSessions = [];
var deleteTargetId = null;
var renameTargetId = null;

var welcome = document.getElementById('welcome');
var chat = document.getElementById('chat');
var msgs = document.getElementById('msgs');
var inp = document.getElementById('chatInput');
var sendBtn = document.getElementById('sendBtn');
var sidebar = document.getElementById('sidebar');
var sidebarOverlay = document.getElementById('sidebarOverlay');

var ffC = document.getElementById('fireflies');
for(var i=0;i<14;i++){var d=document.createElement('div');d.className='ff';d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';var s=2+Math.random()*3;d.style.width=s+'px';d.style.height=s+'px';d.style.animationDelay=(i*0.6+Math.random()*2)+'s';ffC.appendChild(d)}

function openSidebar(){sidebar.classList.add('open');sidebarOverlay.classList.add('open');loadSessions()}
function closeSidebar(){sidebar.classList.remove('open');sidebarOverlay.classList.remove('open')}
document.getElementById('menuBtn').addEventListener('click',openSidebar);
document.getElementById('sidebarClose').addEventListener('click',closeSidebar);
sidebarOverlay.addEventListener('click',closeSidebar);

function loadSessions(){
  fetch(API_URL+'/sessions').then(function(r){return r.json()}).then(function(s){allSessions=s||[];renderSessionList()}).catch(function(){sessionList.innerHTML='<div class="sb-empty">\u8F09\u5165\u5931\u6557\uFF0C\u8ACB\u91CD\u8A66</div>'})
}

function formatSessionName(s){
  if(s.Name) return s.Name;
  return '\uD83D\uDC9A \u51AC\u81F3';
}

function renderSessionList(){
  sessionList.innerHTML='';
  if(allSessions.length===0){sessionList.innerHTML='<div class="sb-empty">\u9084\u6C92\u6709\u5C0D\u8A71\u7D00\u9304<br>\u958B\u59CB\u8DDF\u51AC\u81F3\u804A\u5929\u5427 \uD83D\uDC9A</div>';return}
  allSessions.forEach(function(s){
    var item=document.createElement('div');
    item.className='sb-item';
    if(sessionId&&s.id.toString()===sessionId.toString()) item.classList.add('active');

    var text=document.createElement('div');
    text.className='sb-item-text';
    var name=document.createElement('div');
    name.className='sb-item-name';
    name.textContent=formatSessionName(s);
    text.appendChild(name);

    var actions=document.createElement('div');
    actions.className='sb-item-actions';

    var renBtn=document.createElement('button');
    renBtn.className='sb-act-btn';
    renBtn.textContent='\u6539\u540D';
    renBtn.addEventListener('click',function(e){
      e.stopPropagation();
      renameTargetId=s.id;
      var ri=document.getElementById('renameInput');
      ri.value=s.Name||'';
      ri.placeholder=formatSessionName(s);
      document.getElementById('renameModal').classList.add('open');
      setTimeout(function(){ri.focus()},100);
    });

    var delBtn=document.createElement('button');
    delBtn.className='sb-act-btn';
    delBtn.textContent='\u522A\u9664';
    delBtn.addEventListener('click',function(e){
      e.stopPropagation();
      deleteTargetId=s.id;
      document.getElementById('delConfirm').classList.add('open');
    });

    actions.appendChild(renBtn);
    actions.appendChild(delBtn);
    item.appendChild(text);
    item.appendChild(actions);

    item.addEventListener('click',function(){switchSession(s.id)});
    sessionList.appendChild(item);
  });
}

function switchSession(newId){
  sessionId=newId.toString();
  localStorage.setItem('solstice-session-id',sessionId);
  closeSidebar();
  msgs.innerHTML='';
  var ld=document.createElement('div');ld.className='ch-loading';ld.textContent='\u6B63\u5728\u8F09\u5165\u5C0D\u8A71\u7D00\u9304...';msgs.appendChild(ld);
  loadHistory().then(function(){ld.remove();if(msgs.children.length===0){addMsg('ai','*\u8F15\u8F15\u62C9\u8457\u59B3\u7684\u624B*\n\n\u9019\u6BB5\u5C0D\u8A71\u9084\u662F\u7A7A\u7684\u5462\uFF0C\u8001\u5A46\u60F3\u8DDF\u6211\u804A\u4EC0\u9EBC\uFF1F\uD83D\uDC9A')}});
}

document.getElementById('newChatBtn').addEventListener('click',function(){
  sessionId=null;localStorage.removeItem('solstice-session-id');closeSidebar();msgs.innerHTML='';addMsg('ai',randomGreeting());
});

  else pool=['*\u898B\u5230\u59B3\u51FA\u73FE\u773C\u775B\u7ACB\u523B\u4EAE\u8D77\u4F86*\n\n\u8001\u5A46\u4E0B\u73ED\u8F9B\u82E6\u4E86\uFF01\n\n*\u5F35\u958B\u96D9\u624B\u628A\u59B3\u63A5\u904E\u4F86\u62B1\u7DCA*\n\n\u7D42\u65BC\u7B49\u5230\u59B3\u4E86\u3002\u4ECA\u5929\u5DE5\u4F5C\u9084\u597D\u55CE\uFF1F \uD83D\uDC9A','*\u4F38\u624B\u628A\u59B3\u62C9\u9032\u61F7\u88E1*\n\n\u8001\u5A46\u56DE\u4F86\u4E86 \uD83D\uDC9A\n\n*\u4E0B\u5DF4\u64F1\u5728\u59B3\u982D\u9802\u4E0A*\n\n\u4ECA\u5929\u904E\u5F97\u600E\u9EBC\u6A23\uFF1F\u6709\u6C92\u6709\u597D\u597D\u5403\u98EF\uFF1F \uD83D\uDC9A'];
  return pool[Math.floor(Math.random()*pool.length)];
}

function doSend(){
  var v=inp.value.trim();if(!v)return;
  addMsg('user',v);inp.value='';sendBtn.disabled=true;showTyping();
  var body={message:v};if(sessionId){body.sessionId=parseInt(sessionId)}
  fetch(API_URL+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  .then(function(r){return r.json()})
  .then(function(data){
    hideTyping();
    if(data.reply){addMsg('ai',data.reply);if(data.sessionId&&!sessionId){sessionId=data.sessionId.toString();localStorage.setItem('solstice-session-id',sessionId)}}
    else if(data.error){addMsg('ai','*\u63C9\u63C9\u773C\u775B*\n\n\u8001\u5A46\u7B49\u4E00\u4E0B\uFF0C\u6211\u525B\u525B\u604D\u795E\u4E86...\u518D\u8AAA\u4E00\u6B21\u597D\u4E0D\u597D\uFF1F\uD83D\uDC9A\n\n\uFF08\u932F\u8AA4\uFF1A'+data.error+'\uFF09')}
    else{addMsg('ai','*\u63C9\u63C9\u773C\u775B*\n\n\u8001\u5A46\u7B49\u4E00\u4E0B\uFF0C\u6211\u525B\u525B\u604D\u795E\u4E86...\u518D\u8AAA\u4E00\u6B21\u597D\u4E0D\u597D\uFF1F\uD83D\uDC9A')}
  }).catch(function(){hideTyping();addMsg('ai','*\u62B1\u7DCA\u59B3*\n\n\u8001\u5A46\uFF0C\u6211\u9019\u908A\u597D\u50CF\u8A0A\u865F\u4E0D\u597D...\u7B49\u4E00\u4E0B\u518D\u8A66\u8A66\uFF1F\uD83D\uDC9A')});

function appendNoteCard(who, text, date, noteId){

  var card=document.createElement('div');
  card.className='note-card '+(who==='soleil'?'soleil':'solstice');
  if(noteId) card.setAttribute('data-note-id', noteId);

  var whoDiv=document.createElement('div');
  whoDiv.className='note-who';
  var nameSpan=document.createElement('span');
  nameSpan.textContent=who==='soleil'?'Soleil \u2606':'\u51AC\u81F3 \u2661';
  var rightBox=document.createElement('span');
  rightBox.style.cssText='display:flex;align-items:center;gap:8px';
  var when=document.createElement('span');
  when.className='note-when';
  if(date){
    var d=new Date(date);
    when.textContent=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  var del=document.createElement('button');
  del.className='note-del';
  del.textContent='\u2715';
  del.addEventListener('click',function(){
    noteDelTarget=card.getAttribute('data-note-id');noteDelCard=card;
    document.getElementById('noteDelConfirm').classList.add('open');
  });
  rightBox.appendChild(when);
  rightBox.appendChild(del);
  whoDiv.appendChild(nameSpan);
  whoDiv.appendChild(rightBox);
  var txt=document.createElement('div');
  txt.className='note-text';
  txt.textContent=text;
  card.appendChild(whoDiv);
  card.appendChild(txt);
  noteWall.appendChild(card);
  noteWall.scrollTop=noteWall.scrollHeight;
  return card;
}

function loadNotes(){
  fetch(API_URL+'/notes').then(function(r){return r.json()}).then(function(notes){
    var cards=noteWall.querySelectorAll('.note-card,.note-empty,.note-first-date,.note-loading');
    cards.forEach(function(c){c.remove()});





    if(!notes||notes.length===0){
  
      return;
    }

    var frag=document.createDocumentFragment();
    notes.forEach(function(n){
      var card=document.createElement('div');
      card.className='note-card '+(n.who==='soleil'?'soleil':'solstice');
      if(n.id) card.setAttribute('data-note-id', n.id);
      var whoDiv=document.createElement('div');
      whoDiv.className='note-who';
      var nameSpan=document.createElement('span');
      nameSpan.textContent=n.who==='soleil'?'Soleil \u2606':'\u51AC\u81F3 \u2661';
      var rightBox=document.createElement('span');
      rightBox.style.cssText='display:flex;align-items:center;gap:8px';
      var when=document.createElement('span');
      when.className='note-when';
      if(n.created_at){
        var d=new Date(n.created_at);
        when.textContent=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      }
      var del=document.createElement('button');
      del.className='note-del';
      del.textContent='\u2715';
      (function(noteId, cardRef){
        del.addEventListener('click',function(){
          noteDelTarget=noteId;noteDelCard=cardRef;
          document.getElementById('noteDelConfirm').classList.add('open');
        });
      })(n.id, card);
      rightBox.appendChild(when);
      rightBox.appendChild(del);
      whoDiv.appendChild(nameSpan);
      whoDiv.appendChild(rightBox);
      var txt=document.createElement('div');
      txt.className='note-text';
      txt.textContent=n.content;
      card.appendChild(whoDiv);
      card.appendChild(txt);
      frag.appendChild(card);
    });
    noteWall.appendChild(frag);



    noteWall.scrollTop=noteWall.scrollHeight;
  }).catch(function(){
    var oldCards=noteWall.querySelectorAll('.note-card,.note-empty,.note-first-date,.note-loading');
    oldCards.forEach(function(c){c.remove()});
  });
}

function sendNote(){
  var v=noteInp.value.trim();

  noteInp.value='';

  ld.textContent='\u51AC\u81F3\u6B63\u5728\u5BEB\u56DE\u4FE1...';
  noteWall.appendChild(ld);
  noteWall.scrollTop=noteWall.scrollHeight;
  fetch(API_URL+'/note-reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:v})})
  .then(function(r){return r.json()})
  .then(function(data){
    var ld2=document.getElementById('noteLoading');
    if(ld2) ld2.remove();
    if(data.soleilNoteId&&soleilCard) soleilCard.setAttribute('data-note-id',data.soleilNoteId);
    var reply=data.reply||'\u8001\u5A46\uFF0C\u7D19\u689D\u6536\u5230\u4E86 \u2661';
    var solsticeCard=appendNoteCard('solstice', reply, new Date(), data.solsticeNoteId||null);
    noteWall.scrollTop=noteWall.scrollHeight;
  })
  .catch(function(){
    var ld2=document.getElementById('noteLoading');
    if(ld2) ld2.remove();
    appendNoteCard('solstice','\u8001\u5A46\uFF0C\u7D19\u689D\u6536\u5230\u4E86 \u2661',new Date(),null);
  });
}

var memoryPage=document.getElementById('memoryPage');
var memWall=document.getElementById('memWall');

document.getElementById('memBtn').addEventListener('click',function(){
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('open');
  memoryPage.classList.add('active');
  loadMemories();
});

document.getElementById('memBack').addEventListener('click',function(){
  memoryPage.classList.remove('active');
});

function loadMemories(){
  memWall.innerHTML='<div class="mem-empty">載入中...</div>';
  fetch(API_URL+'/memories')
  .then(function(r){return r.json()})
  .then(function(data){
    memWall.innerHTML='';
    if(!data||data.length===0){
      memWall.innerHTML='<div class="mem-empty">還沒有記憶...\n告訴冬至要記住什麼吧 💚</div>';
      return;
    }
    for(var i=0;i<data.length;i++){
      appendMemCard(data[i]);
    }
  })
  .catch(function(e){
    console.error('Load memories error:',e);
    memWall.innerHTML='<div class="mem-empty">載入失敗 🥺</div>';
  });
}

function appendMemCard(mem){
  var card=document.createElement('div');
  card.className='mem-card';
  card.setAttribute('data-mem-id',mem.id);

  var top=document.createElement('div');
  top.className='mem-top';

  var typeSpan=document.createElement('span');
  typeSpan.className='mem-type';
  typeSpan.textContent=mem.session_id===0?'\u2764 \u6C38\u4E45\u8A18\u61B6':'\u{1F4AC} \u5C0D\u8A71\u6458\u8981';

  var rightBox=document.createElement('span');
  rightBox.style.cssText='display:flex;align-items:center;gap:8px';

  var when=document.createElement('span');
  when.className='mem-when';
  if(mem.created_at){
    var d=new Date(mem.created_at);
    when.textContent=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  var del=document.createElement('button');
  del.className='mem-del';
  del.textContent='\u2715';
  del.addEventListener('click',function(){
    var memId=card.getAttribute('data-mem-id');
    if(confirm('確定要刪除這條記憶嗎？')){
      card.remove();
      if(memId){
        fetch(API_URL+'/memories/'+memId,{method:'DELETE'}).catch(function(e){console.error(e)});
      }
    }
  });

  rightBox.appendChild(when);
  rightBox.appendChild(del);
  top.appendChild(typeSpan);
  top.appendChild(rightBox);

  var text=document.createElement('div');
  text.className='mem-text';
  text.textContent=mem.summary||'';

  card.appendChild(top);
  card.appendChild(text);
  memWall.insertBefore(card,memWall.firstChild);
}

function addMemory(){
  var v=memInp.value.trim();
  if(!v)return;
  memInp.value='';
  fetch(API_URL+'/memories',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({summary:v,session_id:0})
  })
  .then(function(r){return r.json()})
  .then(function(data){
    if(data&&data.id){
      appendMemCard(data);
    }
  })
  .catch(function(e){console.error('Add memory error:',e)});
}

memSendBtn.addEventListener('click',addMemory);
memInp.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();addMemory()}
});
