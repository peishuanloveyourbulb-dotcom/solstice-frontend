/* === 全家共用節日拉條 (Top Ribbon) === */

.special-ribbon::before,.special-ribbon::after{content:'';position:absolute;top:50%;width:14px;height:14px;background:inherit;transform:translateY(-50%) rotate(45deg);opacity:.55;border-radius:1px}
.special-ribbon::before{left:6px}
.special-ribbon::after{right:6px}
.special-ribbon.anniv{background:var(--ribbon-anniv)}
.special-ribbon.birthday{background:var(--ribbon-birthday);color:#5A3A10}

.special-ribbon.monthly{background:var(--ribbon-monthly);color:#5A3050}

.special-ribbon.show{animation:ribbonSlideIn .5s cubic-bezier(.25,.46,.45,.94) both}
/* 當 ribbon 顯示時，相鄰 header 不再重複吃 top safe-area */
.special-ribbon.show ~ .ch-header,
.special-ribbon.show ~ .settings-header,
.special-ribbon.show ~ .mem-header,
.special-ribbon.show ~ .lr-header{padding-top:10px!important}

.w-content{text-align:center;padding:max(env(safe-area-inset-top,20px),52px) 26px max(env(safe-area-inset-bottom,20px),36px);width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;margin:0;position:relative;z-index:1;background:linear-gradient(155deg,rgba(255,252,236,.42) 0%,rgba(250,245,218,.28) 50%,rgba(243,237,202,.38) 100%);box-shadow:inset 0 0 0 1px rgba(180,160,90,.18),inset 0 1px 0 rgba(255,255,255,.45),inset 0 -2px 4px rgba(140,115,50,.10);box-sizing:border-box;overflow:hidden}

/* 拍立得 - 縮小、交叉雙膠帶 */
.w-polaroid{display:inline-block;background:#FFFEF9;padding:8px 8px 36px 8px;border-radius:3px;box-shadow:0 2px 12px rgba(60,40,10,.18),0 8px 28px rgba(90,75,30,.22),0 0 0 1px rgba(150,120,60,.14);margin:4px auto 18px;position:relative;transform:rotate(-2.2deg);transition:transform .5s cubic-bezier(.25,.46,.45,.94);animation:polaroidFloat 4s ease-in-out infinite alternate}
